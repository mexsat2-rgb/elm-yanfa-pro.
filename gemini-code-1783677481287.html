<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الارتقاء المهني والتعلم الحر | علم ينفع</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); border: 1px solid rgba(226, 232, 240, 0.8); }
        .tab-active { background-color: #0f172a !important; color: #ffffff !important; }
    </style>
</head>
<body class="text-slate-800 flex flex-col min-h-screen">

    <header class="relative bg-gradient-to-r from-slate-900 via-indigo-950 to-slate-900 text-white py-16 px-6 shadow-2xl">
        <div class="max-w-6xl mx-auto text-center relative z-10">
            <h1 class="text-3xl md:text-5xl font-black mb-4 tracking-tight">بوابة الارتقاء المهني والتعلم الحر</h1>
            <p class="text-base md:text-xl font-light text-slate-300 max-w-3xl mx-auto">
                مجموعتك المتكاملة لاحتراف الإكسل، الشهادات المهنية، وطرق استرداد الرسوم عبر دعم "هدف".
            </p>
        </div>
    </header>

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm overflow-x-auto">
        <div class="max-w-6xl mx-auto px-4 flex justify-start md:justify-center gap-2 py-3">
            <button onclick="switchSection('welcome')" id="nav-welcome" class="nav-tab px-5 py-2.5 rounded-xl font-bold text-sm text-slate-600 tab-active">الرئيسية</button>
            <button onclick="switchSection('excel')" id="nav-excel" class="nav-tab px-5 py-2.5 rounded-xl font-bold text-sm text-slate-600">دليل الإكسل</button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-8 flex-grow w-full">
        <section id="sec-welcome" class="section-content animate-fade-in">
            <div class="text-center p-10 bg-white rounded-3xl shadow-sm">
                <h2 class="text-3xl font-bold mb-4">أهلاً بك في منصة "علم ينفع"</h2>
                <p class="text-slate-600">اختر القسم المناسب من القائمة أعلاه للبدء برحلتك المهنية.</p>
            </div>
        </section>

        <section id="sec-excel" class="section-content animate-fade-in hidden">
            <div class="max-w-4xl mx-auto">
                <h2 class="text-2xl font-bold mb-6 text-center">دليل الإكسل</h2>
                <div id="excel-courses-list" class="grid gap-4">
                    <p class="text-center text-slate-500">جاري تحميل الدورات...</p>
                </div>
            </div>
        </section>
    </main>

    <script>
        // دالة التبديل بين الأقسام
        function switchSection(sectionId) {
            document.querySelectorAll('.section-content').forEach(sec => sec.classList.add('hidden'));
            document.querySelectorAll('.nav-tab').forEach(btn => btn.classList.remove('tab-active'));
            document.getElementById(`sec-${sectionId}`).classList.remove('hidden');
            document.getElementById(`nav-${sectionId}`).classList.add('tab-active');
        }

        // دالة جلب البيانات من ملف json
        fetch('courses.json')
            .then(res => res.json())
            .then(data => {
                const list = document.getElementById('excel-courses-list');
                list.innerHTML = '';
                data.excel_courses.forEach(c => {
                    list.innerHTML += `
                        <div class="glass-card p-4 rounded-xl flex justify-between items-center shadow-sm">
                            <div>
                                <h3 class="font-bold text-lg text-slate-800">${c.title}</h3>
                                <span class="text-xs bg-indigo-50 text-indigo-600 px-2 py-1 rounded">${c.level}</span>
                            </div>
                            <a href="${c.link}" target="_blank" class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 transition">شاهد</a>
                        </div>
                    `;
                });
            })
            .catch(err => {
                document.getElementById('excel-courses-list').innerHTML = '<p class="text-center text-red-500">حدث خطأ في تحميل الدورات.</p>';
            });
    </script>
</body>
</html>
